name: DNS challenge provider request
description: Suggest a new provider for certificate DNS challenge
labels: [dns provider request]
body:
  - type: input
    id: provider
    attributes:
      label: What provider would you like to see added?
      description: The name of the DNS provider.
      placeholder: "e.g. Namecheap"
    validations:
      required: true

  - type: input
    id: certbot_plugin
    attributes:
      label: Does a certbot plugin exist?
      description: A certbot plugin is required. Search [PyPI](https://pypi.org) for `certbot-dns-<provider>`.
      placeholder: "e.g. certbot-dns-namecheap"
    validations:
      required: true
